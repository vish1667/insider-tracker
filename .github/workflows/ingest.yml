name: Ingest SEC Form 4

# Runs the ingestion worker on a schedule and on manual demand.
on:
  schedule:
    # 23:00 UTC every weekday (after US market close + SEC filing settle).
    # Cron is UTC. Adjust if you want a different time.
    - cron: "0 23 * * 1-5"
  workflow_dispatch:
    inputs:
      days:
        description: "How many calendar days to ingest (1 = today only)"
        required: false
        default: "1"

# Avoid overlapping runs stepping on each other.
concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: worker
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Run ingestion
        run: npx tsx src/index.ts --days ${{ github.event.inputs.days || '1' }}
